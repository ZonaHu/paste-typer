<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --accent: #6366f1;
      --accent-strong: #4f46e5;
      --accent-soft: #eef2ff;
      --bg: #ffffff;
      --surface: #f8f9fc;
      --surface-2: #f1f3f9;
      --border: #e6e8f0;
      --border-strong: #d4d7e3;
      --text: #1e2030;
      --muted: #6b7088;
      --faint: #9aa0b4;
      --success-bg: #ecfdf3; --success-fg: #1a7f48; --success-bd: #c5ecd2;
      --error-bg: #fef2f2;   --error-fg: #b42318;   --error-bd: #f4cfca;
      --info-bg: #eef2ff;    --info-fg: #4044b8;    --info-bd: #d8ddf7;
      --warn: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 2px rgba(20,22,40,.06), 0 4px 16px rgba(20,22,40,.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #818cf8;
        --accent-strong: #6366f1;
        --accent-soft: #1e2140;
        --bg: #16181f;
        --surface: #1d2029;
        --surface-2: #232735;
        --border: #2b2f3d;
        --border-strong: #3a3f50;
        --text: #e8eaf2;
        --muted: #a3a9bd;
        --faint: #757b91;
        --success-bg: #102a1c; --success-fg: #6ee7a8; --success-bd: #1f4733;
        --error-bg: #2a1414;   --error-fg: #f4a8a0;   --error-bd: #4a2420;
        --info-bg: #1a1d3a;    --info-fg: #aab2ff;    --info-bd: #2e3361;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 336px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 16px 18px;
      background:
        radial-gradient(120% 140% at 0% 0%, rgba(99,102,241,.16), transparent 60%),
        var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 34px; height: 34px;
      flex: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(99,102,241,.35);
    }
    .logo svg { width: 19px; height: 19px; }

    .header-text h1 {
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -.01em;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 1px;
    }

    .container { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px; }

    .section { display: flex; flex-direction: column; }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .01em;
    }
    label span { color: var(--accent); font-variant-numeric: tabular-nums; }

    .text-area {
      width: 100%;
      height: 64px;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      resize: none;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .text-area:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg);
      box-shadow: 0 0 0 3px rgba(99,102,241,.18);
    }
    .text-area::placeholder { color: var(--faint); }

    input[type="range"] {
      width: 100%;
      margin: 2px 0 0;
      accent-color: var(--accent);
      cursor: pointer;
      height: 18px;
    }

    .btn {
      padding: 10px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      transition: transform .04s, background .15s, box-shadow .15s, border-color .15s, color .15s;
      text-align: center;
      user-select: none;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
    }
    .btn-primary:hover { box-shadow: 0 4px 14px rgba(99,102,241,.45); filter: brightness(1.04); }

    .btn-secondary { background: var(--danger); color: #fff; }
    .btn-secondary:hover { filter: brightness(.94); }

    .btn-warning { background: var(--warn); color: #fff; }
    .btn-warning:hover { filter: brightness(.96); }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-strong); }

    .btn-clipboard, .btn-info, .btn-gray { /* aliases kept for popup.js class hooks */ }

    .full { width: 100%; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .status {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      text-align: left;
      font-size: 12px;
      line-height: 1.45;
      border: 1px solid transparent;
    }
    .status.success { background: var(--success-bg); color: var(--success-fg); border-color: var(--success-bd); }
    .status.error   { background: var(--error-bg);   color: var(--error-fg);   border-color: var(--error-bd); }
    .status.info    { background: var(--info-bg);     color: var(--info-fg);    border-color: var(--info-bd); }

    .element-info {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      line-height: 1.5;
    }
    .element-info code {
      background: var(--bg);
      padding: 2px 5px;
      border-radius: 5px;
      border: 1px solid var(--border);
      font-family: ui-monospace, 'Roboto Mono', monospace;
      font-size: 10.5px;
      color: var(--accent-strong);
    }

    .card {
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }
    .progress-header span:last-child { color: var(--accent); font-variant-numeric: tabular-nums; }
    .progress-bar-wrapper {
      width: 100%; height: 7px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      border-radius: 99px;
      transition: width .3s ease;
    }

    .navigation-header {
      text-align: center;
      margin-bottom: 11px;
      font-weight: 650;
      font-size: 13px;
    }
    .navigation-row {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; margin-bottom: 10px;
    }
    .navigation-status { font-size: 12px; color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }
    .navigation-buttons { display: flex; gap: 8px; }
    .navigation-row .btn, .navigation-buttons .btn { padding: 8px 12px; font-size: 12px; }

    .help-text { font-size: 11px; color: var(--faint); margin-top: 2px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="20" height="13" rx="2.5" stroke="#fff" stroke-width="1.8"/>
        <path d="M6 10h.01M9.5 10h.01M13 10h.01M16.5 10h.01M6 13h.01M16.5 13h.01M9 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Paste Typer</h1>
      <p>Type clipboard text, naturally</p>
    </div>
  </div>

  <div class="container">
    <div class="section quick">
      <button class="btn btn-ghost btn-clipboard" id="loadClipboard">📋 Clipboard</button>
      <button class="btn btn-ghost btn-info" id="openFloatingUI">🪟 Floating UI</button>
    </div>

    <div class="section">
      <label for="textInput">Text to type</label>
      <textarea id="textInput" class="text-area" placeholder="Enter text or load from clipboard..."></textarea>
    </div>

    <div class="section">
      <label for="speedSlider">Speed <span id="speedValue">50ms</span></label>
      <input type="range" id="speedSlider" min="10" max="200" value="50">
    </div>

    <div class="section">
      <label for="typoChanceSlider">Typo rate <span id="typoChanceValue">0.5%</span></label>
      <input type="range" id="typoChanceSlider" min="0" max="50" value="5" step="1">
      <div class="help-text">0% = no typos · 50% = very frequent</div>
    </div>

    <div class="section">
      <div class="row">
        <button class="btn btn-primary full" id="startTyping">▶ Start</button>
        <button class="btn btn-warning" id="pauseTyping" style="display: none;">⏸ Pause</button>
        <button class="btn btn-secondary" id="stopTyping" style="display: none;">⏹ Stop</button>
      </div>
      <div class="help-text" id="helpText" style="display: none;">
        Pause: can resume · Stop: must restart
      </div>
    </div>

    <div class="section row">
      <button class="btn btn-ghost btn-info" id="findInputs">🎯 Navigate</button>
      <button class="btn btn-ghost btn-gray" id="resetTyping">✕ Clear</button>
    </div>

    <div id="navigationControls" class="card" style="display: none;">
      <div class="navigation-header">Navigation mode</div>
      <div class="navigation-row">
        <button class="btn btn-ghost" id="prevInput">‹ Prev</button>
        <div id="navigationStatus" class="navigation-status">1 / 3</div>
        <button class="btn btn-ghost" id="nextInput">Next ›</button>
      </div>
      <div class="navigation-buttons">
        <button class="btn btn-primary" id="selectInput" style="flex: 1;">Select</button>
        <button class="btn btn-ghost btn-gray" id="exitNavigation" style="flex: 1;">Exit</button>
      </div>
    </div>

    <div id="progressContainer" class="card" style="display: none;">
      <div class="progress-header">
        <span>Progress</span>
        <span id="progressText">0 / 0</span>
      </div>
      <div class="progress-bar-wrapper">
        <div id="progressBar" class="progress-bar" style="width: 0%;"></div>
      </div>
    </div>

    <div id="status" class="status" style="display: none;"></div>
    <div id="elementInfo" class="element-info" style="display: none;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
