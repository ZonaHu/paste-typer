<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
      color: #202124;
      font-size: 14px;
    }
    
    .floating-header {
      background: #202124;
      color: white;
      padding: 12px 16px;
      cursor: move;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px 8px 0 0;
    }
    
    .floating-header h3 {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
    }
    
    .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s;
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .floating-container {
      padding: 16px;
    }
    
    .section {
      margin-bottom: 12px;
    }
    
    .section:last-child {
      margin-bottom: 0;
    }
    
    .section label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #5f6368;
      font-size: 13px;
    }
    
    .text-area {
      width: 100%;
      height: 80px;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      color: #202124;
      background: #ffffff;
    }
    
    .text-area:focus {
      outline: none;
      border-color: #5f6368;
    }
    
    .speed-control {
      width: 100%;
    }
    
    .speed-control input[type="range"] {
      width: 100%;
      height: 4px;
      margin: 8px 0 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #dadce0;
      border-radius: 2px;
      outline: none;
    }
    
    .speed-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #5f6368;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .speed-value {
      font-size: 12px;
      color: #5f6368;
      text-align: center;
    }
    
    .typo-control {
      margin-top: 12px;
    }
    
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    
    .btn-primary {
      background-color: #202124;
      color: #ffffff;
    }
    
    .btn-primary:hover {
      background-color: #303134;
    }
    
    .btn-secondary {
      background-color: #5f6368;
      color: #ffffff;
    }
    
    .btn-secondary:hover {
      background-color: #4a4c50;
    }
    
    .btn-clipboard {
      background-color: #f8f9fa;
      color: #202124;
      border: 1px solid #dadce0;
      width: 100%;
      margin-bottom: 8px;
    }
    
    .btn-clipboard:hover {
      background-color: #f1f3f4;
    }
    
    .status {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 4px;
      text-align: left;
      font-size: 12px;
      display: none;
    }
    
    .status.show {
      display: block;
    }
    
    .status.success {
      background-color: #f0f4f0;
      color: #2d5016;
      border: 1px solid #d4e4d4;
    }
    
    .status.error {
      background-color: #f5f0f0;
      color: #5c2d2d;
      border: 1px solid #e4d4d4;
    }
    
    .status.info {
      background-color: #f0f0f0;
      color: #3d3d3d;
      border: 1px solid #d4d4d4;
    }
  </style>
</head>
<body>
  <div class="floating-header" id="header">
    <h3>Paste Typer</h3>
    <button class="close-btn" id="closeBtn">×</button>
  </div>
  
  <div class="floating-container">
    <div class="section">
      <button class="btn btn-clipboard" id="loadClipboard">Load from Clipboard</button>
    </div>
    
    <div class="section">
      <label for="textInput">Text to type</label>
      <textarea id="textInput" class="text-area" placeholder="Enter text or load from clipboard..."></textarea>
    </div>
    
    <div class="section">
      <div class="speed-control">
        <label for="speedSlider">Speed: <span id="speedValue">50ms</span></label>
        <input type="range" id="speedSlider" min="10" max="200" value="50">
      </div>
    </div>
    
    <div class="section typo-control">
      <div class="speed-control">
        <label for="typoChanceSlider">Typo Rate: <span id="typoChanceValue">0.5%</span></label>
        <input type="range" id="typoChanceSlider" min="0" max="50" value="5" step="1">
      </div>
    </div>
    
    <div class="buttons">
      <button class="btn btn-primary" id="startTyping">Start</button>
      <button class="btn btn-secondary" id="stopTyping">Stop</button>
    </div>
    
    <div id="status" class="status"></div>
  </div>
  
  <script src="floating-ui.js"></script>
</body>
</html>
