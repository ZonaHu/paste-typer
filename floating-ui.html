<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --accent: #6366f1;
      --accent-strong: #4f46e5;
      --accent-soft: #eef2ff;
      --bg: #ffffff;
      --surface: #f8f9fc;
      --border: #e6e8f0;
      --border-strong: #d4d7e3;
      --text: #1e2030;
      --muted: #6b7088;
      --faint: #9aa0b4;
      --success-bg: #ecfdf3; --success-fg: #1a7f48; --success-bd: #c5ecd2;
      --error-bg: #fef2f2;   --error-fg: #b42318;   --error-bd: #f4cfca;
      --info-bg: #eef2ff;    --info-fg: #4044b8;    --info-bd: #d8ddf7;
      --danger: #ef4444;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #818cf8; --accent-strong: #6366f1; --accent-soft: #1e2140;
        --bg: #16181f; --surface: #1d2029; --border: #2b2f3d; --border-strong: #3a3f50;
        --text: #e8eaf2; --muted: #a3a9bd; --faint: #757b91;
        --success-bg: #102a1c; --success-fg: #6ee7a8; --success-bd: #1f4733;
        --error-bg: #2a1414;   --error-fg: #f4a8a0;   --error-bd: #4a2420;
        --info-bg: #1a1d3a;    --info-fg: #aab2ff;    --info-bd: #2e3361;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(20,22,40,.28);
      -webkit-font-smoothing: antialiased;
    }

    .floating-header {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      padding: 12px 14px;
      cursor: move;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .floating-header .title { display: flex; align-items: center; gap: 9px; }
    .floating-header .title svg { width: 17px; height: 17px; opacity: .95; }
    .floating-header h3 { font-size: 13.5px; font-weight: 650; letter-spacing: -.01em; }
    .grip { font-size: 11px; opacity: .7; margin-left: 2px; }

    .close-btn {
      background: rgba(255,255,255,.14);
      border: none;
      color: #fff;
      font-size: 17px;
      line-height: 1;
      cursor: pointer;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 7px;
      transition: background .15s;
    }
    .close-btn:hover { background: rgba(255,255,255,.28); }

    .floating-container { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .section { display: flex; flex-direction: column; }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
    }
    label span { color: var(--accent); font-variant-numeric: tabular-nums; }

    .text-area {
      width: 100%;
      height: 80px;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      resize: none;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .text-area:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg);
      box-shadow: 0 0 0 3px rgba(99,102,241,.18);
    }
    .text-area::placeholder { color: var(--faint); }

    input[type="range"] {
      width: 100%;
      margin: 2px 0 0;
      accent-color: var(--accent);
      cursor: pointer;
      height: 18px;
    }

    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .btn {
      padding: 10px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      transition: transform .04s, filter .15s, background .15s, box-shadow .15s, border-color .15s, color .15s;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
    }
    .btn-primary:hover { box-shadow: 0 4px 14px rgba(99,102,241,.45); filter: brightness(1.04); }

    .btn-secondary { background: var(--danger); color: #fff; }
    .btn-secondary:hover { filter: brightness(.94); }

    .btn-clipboard {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
      width: 100%;
    }
    .btn-clipboard:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-strong); }

    .status {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      text-align: left;
      font-size: 12px;
      line-height: 1.45;
      border: 1px solid transparent;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: var(--success-bg); color: var(--success-fg); border-color: var(--success-bd); }
    .status.error   { background: var(--error-bg);   color: var(--error-fg);   border-color: var(--error-bd); }
    .status.info    { background: var(--info-bg);     color: var(--info-fg);    border-color: var(--info-bd); }

    .help-text { font-size: 11px; color: var(--faint); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="floating-header" id="header">
    <div class="title">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="20" height="13" rx="2.5" stroke="#fff" stroke-width="1.8"/>
        <path d="M6 10h.01M9.5 10h.01M13 10h.01M16.5 10h.01M6 13h.01M16.5 13h.01M9 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <h3>Paste Typer</h3>
      <span class="grip">⠿</span>
    </div>
    <button class="close-btn" id="closeBtn">×</button>
  </div>

  <div class="floating-container">
    <div class="section">
      <button class="btn btn-clipboard" id="loadClipboard">📋 Load from Clipboard</button>
    </div>

    <div class="section">
      <label for="textInput">Text to type</label>
      <textarea id="textInput" class="text-area" placeholder="Enter text or load from clipboard..."></textarea>
    </div>

    <div class="section">
      <label for="speedSlider">Speed <span id="speedValue">50ms</span></label>
      <input type="range" id="speedSlider" min="10" max="200" value="50">
    </div>

    <div class="section">
      <label for="typoChanceSlider">Typo rate <span id="typoChanceValue">0.5%</span></label>
      <input type="range" id="typoChanceSlider" min="0" max="50" value="5" step="1">
      <div class="help-text">0% = no typos · 50% = very frequent</div>
    </div>

    <div class="buttons">
      <button class="btn btn-primary" id="startTyping">▶ Start</button>
      <button class="btn btn-secondary" id="stopTyping">⏹ Stop</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="floating-ui.js"></script>
</body>
</html>
